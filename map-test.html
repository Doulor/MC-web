<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Map Proxy Test</title>
  <style>body{font-family:Segoe UI,Roboto,Arial;background:#0f172a;color:#e2e8f0;padding:20px} .box{max-width:900px;margin:0 auto} .status{padding:12px;border-radius:8px;background:#0b1220;border:1px solid #233042;margin-bottom:12px} .ok{color:#86efac} .err{color:#f87171} iframe{width:100%;height:600px;border:1px solid #334155;border-radius:8px;background:white}</style>
</head>
<body>
  <div class="box">
    <h1>地图代理测试 /map/</h1>
    <p>该页面会尝试通过站点相对路径 <code>/map/</code> 访问地图并显示结果。确保你已在 Cloudflare Pages 中启用了代理 Worker 或者站点的 Worker 正在运行。</p>

    <div id="result" class="status">初始化...</div>

    <button id="btnCheck">检查 /map/（fetch）</button>
    <button id="btnOpen" style="margin-left:8px">在新标签打开 /map/</button>

    <h2 style="margin-top:18px">嵌入 iframe（/map/）</h2>
    <iframe id="mapFrame" src="/map/" title="地图预览"></iframe>
  </div>

  <script>
    const resEl = document.getElementById('result');
    const btn = document.getElementById('btnCheck');
    const open = document.getElementById('btnOpen');
    const frame = document.getElementById('mapFrame');

    function show(msg, ok){
      resEl.textContent = msg;
      resEl.className = 'status ' + (ok ? 'ok' : 'err');
    }

    btn.addEventListener('click', async ()=>{
      show('正在请求 /map/ ...', true);
      try{
        const t0 = performance.now();
        const r = await fetch('/map/', { method: 'GET', cache: 'no-store' });
        const t1 = performance.now();
        if (r.ok){
          const ct = r.headers.get('content-type') || '';
          show('成功: status='+r.status+' content-type='+ct+' (耗时 '+Math.round(t1-t0)+'ms)', true);
          console.log('/map/ headers:', Array.from(r.headers.entries()));
          // try to read small text if HTML
          if (ct.includes('text/html') || ct.includes('application/json')){
            const text = await r.text();
            console.log('/map/ body preview:', text.slice(0,1000));
          }
        } else {
          show('错误: status='+r.status+' (see console for details)', false);
          console.error('/map/ non-ok response', r);
        }
      } catch (err){
        show('请求失败: ' + (err && err.message ? err.message : String(err)), false);
        console.error('fetch /map/ failed', err);
      }
    });

    open.addEventListener('click', ()=>{
      window.open('/map/', '_blank');
    });

    // auto-check on load
    window.addEventListener('load', ()=> btn.click());
  </script>
</body>
</html>
